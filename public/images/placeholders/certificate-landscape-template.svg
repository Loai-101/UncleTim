<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" role="img" aria-label="Landscape certificate template 1200x900">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#760018"/>
      <stop offset="55%" stop-color="#4d0010"/>
      <stop offset="100%" stop-color="#3a000c"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d4af37" stop-opacity="0"/>
      <stop offset="50%" stop-color="#e8cf7a" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#d4af37" stop-opacity="0"/>
    </linearGradient>
    <pattern id="lines" width="48" height="48" patternUnits="userSpaceOnUse" patternTransform="rotate(24)">
      <path d="M0 48 L48 0" stroke="#d4af37" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Canvas: 1200 × 900 (4:3 landscape) -->
  <rect width="100%" height="100%" fill="url(#bg)"/>
  <rect width="100%" height="100%" fill="url(#lines)"/>

  <!-- Outer gold frame -->
  <rect x="48" y="40" width="1104" height="820" fill="none" stroke="#d4af37" stroke-opacity="0.45" stroke-width="1.5"/>
  <rect x="56" y="48" width="1088" height="804" fill="none" stroke="#e8cf7a" stroke-opacity="0.2" stroke-width="0.75"/>

  <!-- Safe content area (keep seals / text inside this box) -->
  <rect x="96" y="88" width="1008" height="724" fill="none" stroke="#d4af37" stroke-opacity="0.18" stroke-dasharray="8 6" stroke-width="1"/>

  <!-- Center mark -->
  <g transform="translate(600, 420)">
    <path d="M0 -12 L12 0 L0 12 L-12 0 Z" fill="none" stroke="#d4af37" stroke-width="1.25"/>
    <circle r="2.5" fill="#e8cf7a"/>
  </g>
  <line x1="500" y1="456" x2="700" y2="456" stroke="url(#shine)" stroke-width="1"/>

  <text x="600" y="500" text-anchor="middle" fill="#e8cf7a" font-family="Georgia, 'Times New Roman', serif" font-size="28" letter-spacing="0.2em">LANDSCAPE CERTIFICATE</text>
  <text x="600" y="536" text-anchor="middle" fill="#fffdf8" fill-opacity="0.7" font-family="Georgia, serif" font-size="16" letter-spacing="0.14em">TEMPLATE 1200 × 900 · 4:3</text>
  <text x="600" y="580" text-anchor="middle" fill="#fffdf8" fill-opacity="0.45" font-family="Georgia, serif" font-size="13" letter-spacing="0.1em">SAFE MARGIN INSIDE DASHED BOX · OBJECT-CONTAIN</text>

  <!-- Corner size labels -->
  <text x="96" y="78" fill="#e8cf7a" fill-opacity="0.5" font-family="Georgia, serif" font-size="11" letter-spacing="0.08em">W 1200</text>
  <text x="1104" y="78" text-anchor="end" fill="#e8cf7a" fill-opacity="0.5" font-family="Georgia, serif" font-size="11" letter-spacing="0.08em">H 900</text>
</svg>
